name: Rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  build_unix:
    name: Build for ${{ matrix.os }}

    strategy:
      matrix:
        # Build for Windows as well to ensure the crate doesn't cause any build issues on non-Unix platforms.
        os: [ubuntu-latest, macOS-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: clechasseur/rs-clippy-check@62ad100473a5e6513e86407b859091115ec89ae3 # v6.0.5
        with:
          args: --all-targets --all-features

      - name: Build
        run: cargo build --all-targets --all-features --verbose

  test_ubuntu:
    name: Test on Ubuntu

    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run tests
        run: |
          sudo useradd daemonize-test
          CARGO_BIN=$(which cargo)
          sudo -E $CARGO_BIN test --all-features --verbose

  test_macos:
    name: Test on macOS

    runs-on: macOS-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run tests
        run: |
          sudo sysadminctl -addUser daemonize-test
          sudo dseditgroup -o create daemonize-test
          CARGO_BIN=$(which cargo)
          sudo -E $CARGO_BIN test --all-features --verbose
